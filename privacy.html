<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-en="Privacy Policy" data-ja="プライバシーポリシー">Privacy Policy</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&display=swap');

    :root {
      --ink: #1a1614;
      --paper: #f7f4ef;
      --accent: #8b3a2a;
      --muted: #8a8076;
      --rule: #d4cfc7;
      --serif-en: 'Cormorant Garamond', Georgia, serif;
      --serif-ja: 'Noto Serif JP', 'Yu Mincho', serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: var(--serif-en);
      font-size: 18px;
      line-height: 1.85;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1.5rem 5rem;
      position: relative;
    }

    body.ja {
      font-family: var(--serif-ja);
      font-size: 16px;
      line-height: 2;
    }

    /* Decorative background grain */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      max-width: 680px;
      width: 100%;
    }

    /* Lang switcher */
    .lang-switcher {
      display: flex;
      justify-content: flex-end;
      gap: 0.25rem;
      margin-bottom: 3rem;
    }

    .lang-btn {
      background: none;
      border: 1px solid var(--rule);
      color: var(--muted);
      font-family: inherit;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      padding: 0.3rem 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .lang-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .lang-btn.active {
      background: var(--ink);
      border-color: var(--ink);
      color: var(--paper);
    }

    /* Header */
    header {
      border-top: 2px solid var(--ink);
      border-bottom: 1px solid var(--rule);
      padding: 2rem 0 1.75rem;
      margin-bottom: 3rem;
      text-align: center;
    }

    .eyebrow {
      font-size: 0.7rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1rem;
    }

    h1 {
      font-weight: 300;
      font-size: clamp(2rem, 5vw, 3.2rem);
      letter-spacing: 0.04em;
      line-height: 1.15;
    }

    body.ja h1 {
      font-size: clamp(1.8rem, 4.5vw, 2.8rem);
      letter-spacing: 0.06em;
    }

    .date-line {
      margin-top: 1.25rem;
      font-size: 0.8rem;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    /* Sections */
    .section {
      margin-bottom: 2.75rem;
      padding-bottom: 2.75rem;
      border-bottom: 1px solid var(--rule);
    }

    .section:last-child {
      border-bottom: none;
      margin-bottom: 0;
    }

    h2 {
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    h2::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--rule);
    }

    p {
      font-size: 1rem;
      color: #3a3530;
    }

    body.ja p {
      font-size: 0.95rem;
    }

    /* Contact link style */
    a {
      color: var(--accent);
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    footer {
      margin-top: 4rem;
      text-align: center;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      color: var(--muted);
    }

    /* Fade-in animation */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .wrapper { animation: fadeUp 0.6s ease both; }
  </style>
</head>
<body>
  <div class="wrapper">

    <div class="lang-switcher">
      <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
      <button class="lang-btn" id="btn-ja" onclick="setLang('ja')">日本語</button>
    </div>

    <header>
      <p class="eyebrow" id="eyebrow">Legal</p>
      <h1 id="main-title">Privacy Policy</h1>
      <p class="date-line" id="date-line">Effective date: 2025-01-01</p>
    </header>

    <main>
      <div class="section">
        <h2 id="section1-heading">Overview</h2>
        <p id="section1-body">This app does not collect, store, or share any personal information.</p>
      </div>

      <div class="section">
        <h2 id="section2-heading">Data Collection</h2>
        <p id="section2-body">No data is collected from users.</p>
      </div>

      <div class="section">
        <h2 id="section3-heading">Contact</h2>
        <p id="section3-body">If you have any questions, please contact us.</p>
      </div>
    </main>

    <footer>
      <span id="footer-text">© 2025 All rights reserved.</span>
    </footer>
  </div>

  <script>
    const strings = {
      en: {
        title:          "Privacy Policy",
        eyebrow:        "Legal",
        mainTitle:      "Privacy Policy",
        dateLine:       "Effective date: 2025-01-01",
        s1heading:      "Overview",
        s1body:         "This app does not collect, store, or share any personal information.",
        s2heading:      "Data Collection",
        s2body:         "No data is collected from users.",
        s3heading:      "Contact",
        s3body:         "If you have any questions, please contact us.",
        footer:         "© 2025 All rights reserved.",
      },
      ja: {
        title:          "プライバシーポリシー",
        eyebrow:        "法的情報",
        mainTitle:      "プライバシーポリシー",
        dateLine:       "施行日：2025年1月1日",
        s1heading:      "概要",
        s1body:         "このアプリは、個人情報の収集・保存・共有を一切行いません。",
        s2heading:      "データ収集について",
        s2body:         "ユーザーからいかなるデータも収集しておりません。",
        s3heading:      "お問い合わせ",
        s3body:         "ご不明な点がございましたら、お気軽にお問い合わせください。",
        footer:         "© 2025 All rights reserved.",
      }
    };

    function setLang(lang) {
      const s = strings[lang];
      document.documentElement.lang = lang;
      document.title = s.title;
      document.body.className = lang === 'ja' ? 'ja' : '';
      document.getElementById('eyebrow').textContent       = s.eyebrow;
      document.getElementById('main-title').textContent    = s.mainTitle;
      document.getElementById('date-line').textContent     = s.dateLine;
      document.getElementById('section1-heading').textContent = s.s1heading;
      document.getElementById('section1-body').textContent    = s.s1body;
      document.getElementById('section2-heading').textContent = s.s2heading;
      document.getElementById('section2-body').textContent    = s.s2body;
      document.getElementById('section3-heading').textContent = s.s3heading;
      document.getElementById('section3-body').textContent    = s.s3body;
      document.getElementById('footer-text').textContent      = s.footer;
      document.getElementById('btn-en').classList.toggle('active', lang === 'en');
      document.getElementById('btn-ja').classList.toggle('active', lang === 'ja');
    }

    // Auto-detect language on load
    const userLang = navigator.language || navigator.userLanguage || 'en';
    setLang(userLang.startsWith('ja') ? 'ja' : 'en');
  </script>
</body>
</html>
